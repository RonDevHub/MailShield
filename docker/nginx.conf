server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Sicherheit: Kein Zugriff auf .sqlite oder .php Files in anderen Ordnern
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    location ~ ^/(data|config|src|templates) {
        deny all;
    }
}