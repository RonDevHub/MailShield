name: Docker Publish

on:
  push:
    branches: [ "main", "beta" ]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rondevhub/mailshield
          tags: |
            # Latest nur für den Main Branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Beta nur für den Beta Branch
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/beta' }}
            # SemVer Tags (v1.0.0 etc.) nur bei Releases
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Caching aktivieren, damit Builds schneller gehen
          cache-from: type=gha
          cache-to: type=gha,mode=max