when:
  - event: push
    branch: beta

steps:
  build-beta:
    image: plugins/docker
    privileged: true 
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/mailshield
      tags: beta
      username:
        from_secret: MAILSHIELD_GITHUBNAME
      password:
        from_secret: MAILSHIELD_GITHUBTOKEN