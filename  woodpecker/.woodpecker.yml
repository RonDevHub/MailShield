steps:
  # 1. Main-Branch -> :latest (Automatisch) 
  publish-latest:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: rondevhub/MailShield
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      tags: latest
      dockerfile: Dockerfile
      context: .
    when:
      event: push
      branch: main

  # 2. Beta-Branch -> :beta (Nur manuell im UI starten!)
  publish-beta:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: rondevhub/MailShield
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      tags: beta
      dockerfile: Dockerfile
      context: .
    when:
      event: manual
      branch: beta

  # 3. Release-Tags -> :v1.0.0 etc. (Automatisch)
  publish-tag:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: rondevhub/MailShield
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      tags: ${CI_COMMIT_TAG}
      dockerfile: Dockerfile
      context: .
    when:
      event: tag